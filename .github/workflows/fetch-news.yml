name: Fetch News

on:
  schedule:
    # Run every 6 hours (4x per day) - high volume mode
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Fetch and rewrite news
        timeout-minutes: 10
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          # AIPipe keys (aipipe.org proxy)
          AIPIPE_KEY_1: ${{ secrets.AIPIPE_KEY_1 }}
          AIPIPE_KEY_2: ${{ secrets.AIPIPE_KEY_2 }}
          AIPIPE_KEY_3: ${{ secrets.AIPIPE_KEY_3 }}
          AIPIPE_KEY_4: ${{ secrets.AIPIPE_KEY_4 }}
        run: npm run fetch-news
        
      - name: Commit new posts and API tracker
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/content/posts/
          git add src/content/.api-tracker.json || true
          git diff --staged --quiet || git commit -m "🔥 Auto-fetch: $(date +'%Y-%m-%d %H:%M')"
          git push
          
      - name: Build site
        run: npm run build
        
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Post to Social Media
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: npm run post-social

      - name: Post to Reddit
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: npm run post-reddit
      
      - name: Commit social post logs
        run: |
          git add src/content/.social-posted.json || true
          git add src/content/.reddit-posted.json || true
          git diff --staged --quiet || git commit -m "📱 Update social post logs"
          git push || true
