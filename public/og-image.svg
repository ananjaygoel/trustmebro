<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0f1a"/>
      <stop offset="50%" style="stop-color:#1a1f35"/>
      <stop offset="100%" style="stop-color:#0f1724"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Accent circles -->
  <circle cx="100" cy="100" r="200" fill="#a855f7" opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="#00d4ff" opacity="0.1"/>
  
  <!-- Fire emoji -->
  <text x="600" y="250" font-size="120" text-anchor="middle">🔥</text>
  
  <!-- Main text -->
  <text x="600" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" text-anchor="middle">
    <tspan fill="url(#accent)">Trust</tspan><tspan fill="white">Me</tspan><tspan fill="url(#accent)">Bro</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="600" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#9ca3af" text-anchor="middle">
    news that hits different 💅
  </text>
  
  <!-- URL -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6b7280" text-anchor="middle">
    trustmebro.pro
  </text>
  
  <!-- Bottom accent line -->
  <rect x="400" y="590" width="400" height="4" rx="2" fill="url(#accent)"/>
</svg>
